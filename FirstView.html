<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nftis - NFT Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER STYLES */
        header {
            background: rgba(10, 14, 39, 0.95);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-text .brand {
            font-size: 22px;
            font-weight: 700;
            color: #FFD700;
            letter-spacing: 1px;
        }

        .logo-text .tagline {
            font-size: 10px;
            color: #FFB700;
            letter-spacing: 2px;
            font-weight: 600;
            margin-top: 2px;
        }

        nav.menu {
            display: flex;
            gap: 50px;
            flex: 1;
            margin-left: 80px;
        }

        nav.menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        nav.menu a:hover {
            color: #FFD700;
        }

        nav.menu a.dropdown-toggle::after {
            content: "⌄";
            font-size: 10px;
            margin-left: 5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 25px;
            border-radius: 8px;
            color: #ffffff;
            width: 220px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-bar:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .social-buttons {
            display: flex;
            gap: 25px;
        }

        .social-btn {
            background: transparent;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-btn:hover {
            color: #FFD700;
            transform: translateY(-2px);
        }

        .social-btn::before {
            content: "f";
            font-size: 16px;
        }

        .social-btn.instagram::before {
            content: "📷";
        }

        /* HERO SECTION */
        .hero {
            padding: 100px 60px;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            display: flex;
            align-items: center;
            gap: 80px;
            min-height: 700px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            right: -100px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .hero-content {
            flex: 1;
            z-index: 2;
            max-width: 600px;
        }

        .hero-content h1 {
            font-size: 62px;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.15;
            color: #ffffff;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }

        .hero-logo-inline {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #FFA500 0%, #FFD700 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a0e27;
            font-size: 32px;
            flex-shrink: 0;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
        }

        .hero-content p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            line-height: 1.7;
            max-width: 500px;
        }

        .cta-button {
            background: transparent;
            color: #ffffff;
            padding: 12px 0;
            border: none;
            border-bottom: 2px solid #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .cta-button:hover {
            border-bottom-color: #FFD700;
            color: #FFD700;
            padding-bottom: 15px;
        }

        /* HERO IMAGES SECTION */
        .hero-images {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 2;
            position: relative;
        }

        .nft-image-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .nft-image-wrapper:first-child {
            transform: translateY(-20px) scale(1.05);
        }

        .nft-image-wrapper:hover {
            transform: translateY(-30px) scale(1.1);
        }

        .nft-image-circle {
            max-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            position: relative;
        }

        .nft-image-circle img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0;
            box-shadow: 0 30px 80px rgba(255, 215, 0, 0.15);
        }

        .nft-image-rect {
            max-width: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            position: relative;
        }

        .nft-image-rect img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
        }

        /* LOGO DEBAJO DEL TITULO */
        .hero-logo-subtitle {
            max-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
            margin: 20px 0 0 0;
            flex-shrink: 0;
            overflow: visible;
        }

        .hero-logo-subtitle img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* FLOATING EFFECTS */
        @keyframes float {
            0%, 100% {
                transform: translateY(-20px) scale(1.05);
            }
            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .nft-image-wrapper:first-child {
            animation: float 4s ease-in-out infinite;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .hero {
                flex-direction: column;
                padding: 60px 40px;
                text-align: center;
                gap: 50px;
            }

            .hero-content h1 {
                font-size: 48px;
                justify-content: center;
            }

            .hero-logo-inline {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }

            .hero-images {
                flex-direction: column;
                gap: 20px;
                align-items: center;
            }

            .nft-image-circle {
                width: 220px;
                height: 220px;
            }

            .nft-image-rect {
                width: 200px;
                height: 300px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px 20px;
                gap: 15px;
            }

            nav.menu {
                margin-left: 0;
                justify-content: center;
                flex-wrap: wrap;
                gap: 20px;
            }

            .search-bar {
                width: 150px;
            }

            .hero {
                padding: 40px 20px;
                min-height: auto;
            }

            .hero-content h1 {
                font-size: 32px;
            }

            .social-buttons {
                gap: 15px;
            }

            .hero-images {
                flex-direction: row;
                gap: 15px;
            }

            .nft-image-circle {
                width: 150px;
                height: 150px;
            }

            .nft-image-rect {
                width: 140px;
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo-wrapper">
            <div class="logo-text">
                <img width="208" height="103" src="https://cms.googlycode.com/wp19/wp-content/uploads/2024/02/logo.svg" class="custom-logo svg-logo-image" alt="Nftis" decoding="async">
            </div>
        </div>
        <nav class="menu">
            <a href="#home">Home</a>
            <a href="#pages" class="dropdown-toggle">Pages</a>
            <a href="#nftmarketplace">NFT Marketplace</a>
            <a href="#activity">Activity</a>
            <a href="#blog">Blog</a>
        </nav>
        <div class="header-right">
            <input type="text" class="search-bar" placeholder="Search ...">
            <div class="social-buttons">
                <button class="social-btn">Facebook</button>
                <button class="social-btn instagram">Instagram</button>
            </div>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h1>
                Easy Create &
                Sell Extraordinary
                NFT's
            </h1>
            <div class="hero-logo-subtitle">
                <img src="https://cms.googlycode.com/wp19/wp-content/uploads/2024/02/slider-img-text.png" alt="NFT Logo">
            </div>
            <p>Explore our comprehensive platform for creating and selling exceptional NFTs with ease.</p>
            <button class="cta-button">Get Easy Access</button>
        </div>

        <div class="hero-images">
            <div class="nft-image-wrapper">
                <div class="nft-image-circle">
                    <img src="https://cms.googlycode.com/wp19/wp-content/uploads/2024/02/slider-img-01-1.png" alt="Chimpanzee NFT">
                </div>
            </div>
            <div class="nft-image-wrapper">
                <div class="nft-image-rect">
                    <img src="https://cms.googlycode.com/wp19/wp-content/uploads/2024/02/slider-img-01-2.png" alt="Digital Art NFT">
                </div>
            </div>
        </div>
    </section>

</body>
</html>
